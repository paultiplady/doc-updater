name: Review Living Documents

on:
  schedule:
    # Run monthly on the 1st at midnight UTC
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes)"
        required: false
        default: "false"
        type: boolean
      path:
        description: "Path to review (default: docs/)"
        required: false
        default: "docs/"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  review-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install doc-updater
        run: |
          # Install from PyPI (when published):
          # uv pip install doc-updater

          # Or install from this repo:
          uv pip install .

      - name: Review documents
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi

          REVIEW_PATH="${{ inputs.path || 'docs/' }}"

          # Run review and capture output
          doc-updater review "$REVIEW_PATH" $FLAGS --verbose 2>&1 | tee review-output.txt

          # Check if any files were modified
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.review.outputs.changes == 'true' && inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-review living documents"
          title: "docs: Living document updates"
          body: |
            ## Automated Document Review

            This PR contains updates from the automated document review process.

            ### Review Summary
            ```
            $(cat review-output.txt)
            ```

            ---
            *Generated by [doc-updater](https://github.com/your-org/doc-updater)*
          branch: docs/auto-review-${{ github.run_number }}
          delete-branch: true
          labels: documentation,automated
